name: Auto-Approve & Merge Dependabot

on: pull_request  # Triggers on PR open/reopen/sync for the current branch

permissions:
  contents: write
  pull-requests: write

jobs:
  dependabot:
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]'  # Only Dependabot PRs
    steps:
      - name: Fetch metadata
        id: metadata
        uses: dependabot/fetch-metadata@v2  # Extracts update type (patch/minor/major), dep name

      - name: Debug (remove later)
        run: |
          echo "Update type: ${{ steps.metadata.outputs.update-type }}"
          echo "PR URL: ${{ github.event.pull_request.html_url }}"

      - name: PR update type verification
        if: steps.metadata.outputs.update-type == 'version-update:semver-major'
        run: |
          echo " The update type is major, therefore no auto-approval or auto-merge will be performed."
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}

      - name: Approve a PR if it's low-risk
        if: steps.metadata.outputs.update-type == 'version-update:semver-patch' || steps.metadata.outputs.update-type == 'version-update:semver-minor'  # Not majors
        run: gh pr review --approve "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Enable auto-merge
        if: steps.metadata.outputs.update-type == 'version-update:semver-patch' || steps.metadata.outputs.update-type == 'version-update:semver-minor'
        run: gh pr merge --auto --merge "$PR_URL"
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
