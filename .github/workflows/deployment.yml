name: Deploy Python project to Azure Web App

on:
  push:
    branches: ["dev", "feat/deployment"]

env:
  AZURE_WEBAPP_NAME: 'aletheia-back-end-test'  # App Service name
  WORKING_DIRECTORY: 'src'             # Deploy the src folder
  PYTHON_VERSION: '3.13'
  STARTUP_COMMAND: ''  # set this to the startup command required to start the gunicorn server. default it is empty

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v1
        with:
          python-version: ${{ env.PYTHON_VERSION }}
        
     # install dependencies
    #   - name: python install venv and dependencies
    #     working-directory: ${{ env.WORKING_DIRECTORY }}
    #     run: |
    #         sudo apt install python${{ env.PYTHON_VERSION }}-venv
    #         python -m venv --copies antenv
    #         source antenv/bin/activate
    #         pip install setuptools
    #         pip install -r requirements.txt

    # To use Azure RBAC instead of Publish Profile, uncomment the task below
        # - name: 'Login via Azure CLI'
        # uses: azure/login@v1
        # with:
        #     creds: ${{ secrets.AZURE_RBAC_CREDENTIALS }} # set up AZURE_RBAC_CREDENTIALS secrets in your repository

      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v2
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEB_APP_PUBLISH_PROFILE }}
          package: ${{ env.WORKING_DIRECTORY }}
          startup-command: "gunicorn -w 2 -k uvicorn.workers.UvicornWorker -b 0.0.0.0:8000 aletheia_back_end.app:app"
        #   scm-do-build-during-deployment: true
        #   enable-oryx-build: true