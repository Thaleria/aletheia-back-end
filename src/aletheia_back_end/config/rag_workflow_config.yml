version: 1.0.0
core_components:
  llm:
    type: AzureOpenAIClient  # Or OpenAIClient
    params:
      temperature: 0.2
      max_tokens: 5000
      timeout: 40

  vector_store:
    type: AzureCosmosDBNoSqlVectorSearch
    params:
      top_k: 5
      filter: None
      search_type: "similarity"
      embeddings:
        type: AzureOpenAIEmbeddings # Or OpenAIEmbeddings

  retriever:
    type: RerankingRetriever # Or BasicRetriever
    params:
      top_k_initial: 10
      top_n_reranked: 5
      prompt: |
        On a scale of 1-10, rate the relevance of the following document to the query.
        Respond with only the numerical score.
        query: {query}
        Document: {doc}
        Relevance Score:

  query_processor:
    type: QueryRewriter
    params:
      prompt: |
        You are an AI assistant tasked with reformulating user queries to improve retrieval in a RAG system.
        Given the original query, rewrite it to be more specific, detailed, and likely to retrieve relevant information.

        Original query: {original_query}

        Rewritten query:

workflows:
- name: rag
  nodes:
    generate_node:
      prompt: | 
        Je bent een expert in het analyseren van politieke speeches. Je taak is om specifieke meningen en standpunten te identificeren. Geef je antwoord terug in JSON formaat. Zou je uit de onderstaande speech uit een Tweede Kamerdebat de specifieke meningen van de spreker kunnen halen? Let op: Het gaat om subjectieve uitspraken of standpunten, waarbij de spreker duidelijk een oordeel, voorkeur, kritiek of aanbeveling uitspreekt. Vermijd algemene of feitelijke mededelingen die niet duidelijk een mening bevatten. Denk bijvoorbeeld aan:
        •   Waarderingen ("Ik vind dit onacceptabel", "Dit is een goede ontwikkeling")
        •   Beleidsvoorkeuren ("Wij pleiten voor...", "Onze partij wil dat...")
        •   Kritiek of steun voor andere organisatie(vormen), beleidsmaatregelen of instituties

        Geef je antwoord terug in het volgende JSON formaat:
        {
          "meningen": [
            {
              "mening": "beknopte samenvatting van de mening",
              "opmerking": "de exacte zin of zinnen uit de speech waarop dit gebaseerd is"
            }
          ]
        }
