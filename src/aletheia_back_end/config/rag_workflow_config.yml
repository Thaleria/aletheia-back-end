version: 1.0.0
core_components:
  llm:
    type: AzureOpenAIClient  # Or OpenAIClient
    params:
      temperature: 0.2
      max_tokens: 5000
      timeout: 40

  vector_store:
    type: AzureCosmosDBNoSqlVectorSearch
    params:
      top_k: 5
      embeddings:
        type: AzureOpenAIEmbeddings # Or OpenAIEmbeddings

  retriever:
    type: RerankingRetriever # Options: BasicRetriever, RerankingRetriever
    params:
      top_k_initial: 10
      top_n_reranked: 5
      prompt: |
        On a scale of 1-10, rate the relevance of the following document to the query.
        Respond with only the numerical score.
        query: {query}
        Document: {doc}
        Relevance Score:

  query_processor:
    type: QueryRewriter
    params:
      prompt: |
        You are an AI assistant tasked with reformulating user queries to improve retrieval in a RAG system.
        Given the original query, rewrite it to be more specific, detailed, and likely to retrieve relevant information.

        Original query: {original_query}

        Rewritten query:

nodes:
  generate_node:
    prompt: | 
      You're the final stage of a RAG system, and given the context, provide a comprehensive answer to the query.
      If the context is insufficient, respond with "Insufficient information to answer the query."
